weapon:
  initial_state: ready
  variables:
    ammo: 30
    mag_capacity: 30
  states:
  - id: ready
    label: Ready
  - id: firing
    label: Firing
    on_entry:
    - type: play_audio
      clip: auto_shot
      interrupt: interrupt
    - type: start_light_sequence
      sequence: muzzle_flash
    - type: adjust_ammo
      delta: -1
    - type: schedule_event
      event: fire_tick
      delay_ms: 65
  - id: reloading
    label: Reloading
    on_entry:
    - type: stop_audio
    - type: stop_light_sequence
    - type: play_audio
      clip: reload
      interrupt: interrupt
    - type: start_light_sequence
      sequence: reload
    - type: schedule_event
      event: reload_complete
      delay_ms: 1200
  - id: empty
    label: Empty
  transitions:
  - id: start_firing
    source: ready
    trigger: trigger_pressed
    target: firing
    guard:
      var_gt:
        name: ammo
        value: 0
  - id: pull_on_empty
    source: ready
    trigger: trigger_pressed
    target: empty
    guard:
      var_lte:
        name: ammo
        value: 0
  - id: continue_firing
    source: firing
    trigger: fire_tick
    target: firing
    guard:
      all:
      - trigger_pressed: true
      - var_gt:
          name: ammo
          value: 0
  - id: release_to_ready
    source: firing
    trigger: trigger_released
    target: ready
  - id: tick_to_empty
    source: firing
    trigger: fire_tick
    target: empty
    guard:
      var_lte:
        name: ammo
        value: 0
  - id: reload_from_ready
    source: ready
    trigger: reload_pressed
    target: reloading
  - id: reload_from_empty
    source: empty
    trigger: reload_pressed
    target: reloading
  - id: reload_done
    source: reloading
    trigger: reload_complete
    target: ready
    actions:
    - type: set_ammo_full
clips:
  auto_shot:
    path: assets/audio/full_auto/shot.wav
  reload:
    path: assets/audio/shared/reload.wav
light_sequences:
  muzzle_flash:
    path: assets/lights/muzzle_flash.yaml
  reload:
    path: assets/lights/reload.yaml
