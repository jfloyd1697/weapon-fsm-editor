weapon:
  initial_state: alive

  variables:
    health: 4
    max_health: 4

  clips:
    reload:
      path: assets/audio/PickupHeart.wav

    C3_Hurt1:
      path: assets/audio/C3/C3_Hurt1.wav
    C3_Hurt2:
      path: assets/audio/C3/C3_Hurt2.wav
    C3_Hurt3:
      path: assets/audio/C3/C3_Hurt3.wav
    C3_Death1:
      path: assets/audio/C3/C3_Death1.wav
    C3_Death2:
      path: assets/audio/C3/C3_Death2.wav

  clip_sets:
    c3_hurt:
      mode: random
      clips:
        - C3_Hurt1
        - C3_Hurt2
        - C3_Hurt3

    c3_die:
      mode: random
      clips:
        - C3_Death1
        - C3_Death2

  states:
    - id: alive
      label: Alive

    - id: hurt
      label: Hurt
      on_entry:
        - type: play_sound_random
          clip_set: c3_hurt
          interrupt: schedule
        - type: add_var
          name: health
          value: -1
        - type: schedule_event
          event: hurt_done
          delay_ms: 150

    - id: dead
      label: Dead
      on_entry:
        - type: play_sound_random
          clip_set: c3_die

    - id: healing
      label: Healing
      on_entry:
        - type: play_audio
          clip: reload
        - type: schedule_event
          event: heal_done
          delay_ms: 700

  transitions:
    - id: take_hit
      source: alive
      trigger: trigger_pressed
      guard:
        var_gt:
          name: health
          value: 0
      target: hurt

    - id: hurt_done_alive
      source: hurt
      trigger: hurt_done
      guard:
        var_gt:
          name: health
          value: 0
      target: alive

    - id: hurt_done_dead
      source: hurt
      trigger: hurt_done
      guard:
        var_eq:
          name: health
          value: 0
      target: dead

    - id: heal_from_alive
      source: alive
      trigger: reload_pressed
      target: healing

    - id: heal_from_dead
      source: dead
      trigger: reload_pressed
      target: healing

    - id: heal_done
      source: healing
      trigger: heal_done
      target: alive
      actions:
        - type: set_var
          name: health
          value_from_var: max_health
