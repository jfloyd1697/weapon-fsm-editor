weapon:
  initial_state: ready
  states:
  - id: ready
    label: Ready
  - id: reloading
    label: Reloading
  transitions:
  - actions:
    - arguments:
        clip: shot
        interrupt: interrupt
        mode: one_shot
      interrupt: interrupt
      mode: one_shot
      type: play_audio
    id: fire
    source: ready
    target: ready
    trigger: trigger_pressed
  - actions:
    - arguments:
        clip: reload
        interrupt: interrupt
        mode: one_shot
      interrupt: interrupt
      mode: one_shot
      type: play_audio
    id: reload
    source: ready
    target: reloading
    trigger: reload_pressed
  - id: reload_done
    source: reloading
    target: ready
    trigger: reload_finished
