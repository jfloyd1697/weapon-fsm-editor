clips:
  shot:
    path: assets/audio/prime-arm-cannon/prime-basic.wav
    preload: true
  reload:
    path: assets/audio/prime-arm-cannon/prime-basic2.wav
    preload: true
weapon:
  initial_state: ready
  states:
  - id: ready
    label: Ready
  - id: reloading
    label: Reloading
  transitions:
  - id: fire
    source: ready
    trigger: trigger_pressed
    target: ready
    actions:
    - type: play_audio
      clip: shot
  - id: reload
    source: ready
    trigger: reload_pressed
    target: reloading
    actions:
    - type: play_audio
      clip: reload
    - type: schedule_event
      event: reload_finished
  - id: reload_done
    source: reloading
    trigger: reload_finished
    target: ready
