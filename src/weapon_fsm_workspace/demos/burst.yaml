weapon:
  initial_state: ready

  variables:
    burst_remaining: 0

  clips:
    shot:
      path: assets/audio/burst/shot.wav

  light_sequences:
    muzzle_flash:
      path: assets/lights/muzzle_flash.yaml

  states:
    - id: ready
      label: Ready
      on_entry:
         - type: stop_light_sequence

    - id: burst
      label: Burst
      on_entry:
        - type: play_sound
          clip: shot
        - type: start_light_sequence
          sequence: muzzle_flash
        - type: add_var
          name: burst_remaining
          value: -1
        - type: schedule_event
          event: burst_tick
          delay_ms: 70

  transitions:
    - id: start_burst
      source: ready
      trigger: trigger_pressed
      target: burst
      actions:
        - type: set_var
          name: burst_remaining
          value: 3

    - id: burst_continue
      source: burst
      trigger: burst_tick
      guard:
        var_gt:
          name: burst_remaining
          value: 0
      target: burst

    - id: burst_done
      source: burst
      trigger: burst_tick
      guard:
        var_lte:
          name: burst_remaining
          value: 0
      target: ready