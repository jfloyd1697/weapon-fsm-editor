weapon:
  initial_state: ready

  clips:
    shot:
      path: assets/audio/prime-arm-cannon/prime-basic.wav

#  light_sequences:
#    muzzle_flash:
#      path: assets/lights/muzzle_flash.yaml

  states:
    - id: ready
      label: Ready

    - id: firing
      label: Firing
      on_entry:
        - type: schedule_event
          event: fire_tick
          delay_ms: 60

  transitions:
    - id: start_firing
      source: ready
      trigger: trigger_pressed
      target: firing

    - id: keep_firing
      source: firing
      trigger: fire_tick
      guard:
        trigger_pressed: true
      target: firing
      actions:
        - type: play_sound
          clip: shot
#        - type: start_light_sequence
#          sequence: muzzle_flash
        - type: schedule_event
          event: fire_tick
          delay_ms: 60

    - id: stop_firing
      source: firing
      trigger: trigger_released
      target: ready
      actions:
        - type: cancel_scheduled_events
          event: fire_tick