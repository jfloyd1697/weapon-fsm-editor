weapon:
  initial_state: ready

  variables:
    ammo: 6
    mag_capacity: 6
    charge_ticks: 0
    charge_threshold: 80
    charge_stage: 0

  states:
    - id: ready
      label: Ready

    - id: charging
      label: Charging
      on_entry:
        - type: set_var
          name: charge_ticks
          value: 0
        - type: set_var
          name: charge_stage
          value: 0
        - type: play_audio_loop
          clip: charge_loop
          interrupt: ignore
        - type: start_light_sequence
          sequence: charge_glow
        - type: schedule_event
          event: charge_tick
          delay_ms: 10

    - id: charged
      label: Charged
      on_entry:
        - type: stop_audio
        - type: play_audio
          clip: charge_ready
        - type: start_light_sequence
          sequence: fully_charged

    - id: normal_shot
      label: Normal Shot
      on_entry:
        - type: stop_audio
        - type: stop_light_sequence
        - type: play_audio
          clip: normal_shot
        - type: start_light_sequence
          sequence: muzzle_flash
        - type: adjust_ammo
          delta: -1
        - type: schedule_event
          event: shot_done
          delay_ms: 80

    - id: big_shot
      label: Big Shot
      on_entry:
        - type: stop_audio
        - type: stop_light_sequence
        - type: play_audio
          clip: big_shot
        - type: start_light_sequence
          sequence: big_flash
        - type: adjust_ammo
          delta: -1
        - type: schedule_event
          event: shot_done
          delay_ms: 140

    - id: reloading
      label: Reloading
      on_entry:
        - type: stop_audio
        - type: stop_light_sequence
        - type: play_audio
          clip: reload
          interrupt: schedule
        - type: start_light_sequence
          sequence: reload
        - type: schedule_event
          event: reload_complete
          delay_ms: 1200

    - id: empty
      label: Empty

  transitions:
    - id: start_charge
      source: ready
      trigger: trigger_pressed
      guard:
        var_gt:
          name: ammo
          value: 0
      target: charging

    - id: dry_fire_ready
      source: ready
      trigger: trigger_pressed
      guard:
        var_eq:
          name: ammo
          value: 0
      target: empty
      actions:
        - type: play_audio
          clip: dry_fire

    - id: charge_tick_stage_1
      source: charging
      trigger: charge_tick
      guard:
        all:
          - trigger_pressed: true
          - var_gte:
              name: charge_ticks
              value: 20
          - var_eq:
              name: charge_stage
              value: 0
          - var_lt:
              name: charge_ticks
              value_from_var: charge_threshold
      target: charging
      actions:
        - type: add_var
          name: charge_ticks
          value: 1
        - type: set_var
          name: charge_stage
          value: 1
        - type: play_audio
          clip: charge_stage_1
          interrupt: ignore
        - type: schedule_event
          event: charge_tick
          delay_ms: 10

    - id: charge_tick_stage_2
      source: charging
      trigger: charge_tick
      guard:
        all:
          - trigger_pressed: true
          - var_gte:
              name: charge_ticks
              value: 50
          - var_eq:
              name: charge_stage
              value: 1
          - var_lt:
              name: charge_ticks
              value_from_var: charge_threshold
      target: charging
      actions:
        - type: add_var
          name: charge_ticks
          value: 1
        - type: set_var
          name: charge_stage
          value: 2
        - type: play_audio
          clip: charge_stage_2
          interrupt: ignore
        - type: schedule_event
          event: charge_tick
          delay_ms: 10

    - id: charge_tick_continue
      source: charging
      trigger: charge_tick
      guard:
        all:
          - trigger_pressed: true
          - var_lt:
              name: charge_ticks
              value_from_var: charge_threshold
      target: charging
      actions:
        - type: add_var
          name: charge_ticks
          value: 1
        - type: schedule_event
          event: charge_tick
          delay_ms: 10

    - id: charge_done
      source: charging
      trigger: charge_tick
      guard:
        all:
          - trigger_pressed: true
          - var_gte:
              name: charge_ticks
              value_from_var: charge_threshold
      target: charged
      actions:
        - type: add_var
          name: charge_ticks
          value: 1

    - id: release_early
      source: charging
      trigger: trigger_released
      guard:
        var_lt:
          name: charge_ticks
          value_from_var: charge_threshold
      target: normal_shot

    - id: release_charged
      source: charged
      trigger: trigger_released
      target: big_shot

    - id: shot_done_normal_ready
      source: normal_shot
      trigger: shot_done
      guard:
        var_gt:
          name: ammo
          value: 0
      target: ready

    - id: shot_done_normal_empty
      source: normal_shot
      trigger: shot_done
      guard:
        var_eq:
          name: ammo
          value: 0
      target: empty

    - id: shot_done_big_ready
      source: big_shot
      trigger: shot_done
      guard:
        var_gt:
          name: ammo
          value: 0
      target: ready

    - id: shot_done_big_empty
      source: big_shot
      trigger: shot_done
      guard:
        var_eq:
          name: ammo
          value: 0
      target: empty

    - id: reload_from_ready
      source: ready
      trigger: reload_pressed
      target: reloading

    - id: reload_from_empty
      source: empty
      trigger: reload_pressed
      target: reloading

    - id: reload_done
      source: reloading
      trigger: reload_complete
      target: ready
      actions:
        - type: set_ammo_full
