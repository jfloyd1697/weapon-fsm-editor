clips:
  shot: assets/audio/prime-arm-cannon/prime-basic.wav
  reload: assets/audio/prime-arm-cannon/prime-basic2.wav
weapon:
  initial_state: ready
  states:
  - id: ready
    label: Ready
  - id: reloading
    label: Reloading
  transitions:
  - id: fire
    source: ready
    target: ready
    trigger: trigger_pressed
    actions:
    - type: play_audio
      clip: shot
  - id: reload
    source: ready
    target: reloading
    trigger: reload_pressed
    actions:
    - type: play_audio
      clip: reload
  - id: reload_done
    source: reloading
    target: ready
    trigger: reload_finished
